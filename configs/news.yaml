# 新闻只补充候选股信息，不参与全市场扫描；只有形态筛选形成研究池后才会调用。
news:
  enabled: true
  lookback_hours: 30
  max_items_per_stock: 5
  raw_cache_directory: data/raw_news
  cninfo:
    enabled: true
    page_size: 10
    request_interval_seconds: 0.25
  eastmoney_stock_news:
    # 免费公开网页备用源，只查询研究池。它没有 SLA 或商业授权保证，失败时安全降级。
    enabled: true
    request_interval_seconds: 0.4
  tushare:
    # major_news 需要单独的付费权限，账号未明确开通时保持关闭。
    enabled: false
    api_key_env: TUSHARE_TOKEN
    source: 财联社
    endpoint: https://api.waditu.com
